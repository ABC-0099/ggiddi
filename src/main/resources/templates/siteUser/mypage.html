<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>끼역띠귿 — 마이페이지</title>
    <link rel="stylesheet" th:href="@{/css/layout/navbar.css}" />
    <link rel="stylesheet" th:href="@{/css/layout/footer.css}" />
    <link rel="stylesheet" th:href="@{/css/siteUser/mypage.css}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
</head>
<body>

<div class="bg-orbs"><div class="orb o1"></div><div class="orb o2"></div></div>
<div th:replace="~{layout/navbar :: navbar(currentMenu='mypage')}"></div>

<div class="mypage-container">

    <!-- 좌측 사이드바 -->
    <aside class="mypage-sidebar">

        <!-- 프로필 카드 -->
        <div class="profile-card">
            <div class="profile-avatar" th:text="${#strings.substring(siteUser.username, 0, 1)}">유</div>
            <div class="profile-name" th:text="${siteUser.name}">이름</div>
            <div class="profile-username" th:text="'@' + ${siteUser.username}">아이디</div>

            <div class="subscribe-badge" th:if="${subscription != null}">
                <svg viewBox="0 0 24 24" width="13" height="13" style="vertical-align:-2px; margin-right:2px;">
                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" fill="#D9A32C"/>
                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87.4 2.35L12 12z" fill="#F4CC66"/>
                </svg>
                <span th:text="${subscription.planName}">구독</span> · D-<span th:text="${subscription.remainingDays}">0</span>
            </div>

            <div class="profile-stats">
                <div class="stat-box">
                    <div class="stat-value">준비중</div>
                    <div class="stat-label">완료 강의</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">준비중</div>
                    <div class="stat-label">랭킹</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" style="display:flex; align-items:center; justify-content:center; gap:3px;">
                        <svg viewBox="0 0 24 24" width="20" height="20">
                            <path d="M11 2c1 4-5 5.5-5 10.5a6 6 0 0 0 12 0c0-2-1-3.5-2-4.3.7 3-1.3 4.3-2.5 4.3-1.5 0-2.1-1.5-1-3.3C9.5 9.7 9 12 9 13.5a3 3 0 0 0 6 0c0-4.5-3-6-4-11.5z" fill="#D9660F"/>
                            <path d="M11.5 8c.4 1.5-1.5 2.2-1.5 4a2.2 2.2 0 0 0 4.4 0c0-.7-.3-1.3-.7-1.6.3 1-.5 1.6-1 1.6-.6 0-.8-.6-.4-1.3-1.1.1-1.6 1-1.6 1.7a1.2 1.2 0 0 0 2.4 0c0-1.8-1.2-2.4-1.6-4.4z" fill="#FFCB6B"/>
                        </svg>
                        <span th:text="${siteUser.streakDays}">0</span>일
                    </div>
                    <div class="stat-label">연속 학습</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value">준비중</div>
                    <div class="stat-label">총 학습시간</div>
                </div>
            </div>

            <button type="button" class="btn-profile-edit">
                <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px; margin-right:3px;">
                    <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5z"/>
                </svg>
                프로필 수정
            </button>
        </div>

        <!-- 메뉴 -->
        <nav class="mypage-menu">
            <button type="button" class="menu-item active" data-tab="info">
                <span style="display:flex; align-items:center; gap:6px;">
                    <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="8" r="4"/>
                        <path d="M4 21c0-4.4 3.6-7 8-7s8 2.6 8 7"/>
                    </svg>
                    회원정보
                </span><span class="menu-arrow">›</span>
            </button>
            <button type="button" class="menu-item" data-tab="study">
                <span style="display:flex; align-items:center; gap:6px;">
                    <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="20" x2="18" y2="10"/>
                        <line x1="12" y1="20" x2="12" y2="4"/>
                        <line x1="6" y1="20" x2="6" y2="14"/>
                    </svg>
                    학습 현황
                </span><span class="menu-arrow">›</span>
            </button>
            <button type="button" class="menu-item" data-tab="purchase">
                <span style="display:flex; align-items:center; gap:6px;">
                    <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="5" width="20" height="14" rx="2"/>
                        <line x1="2" y1="10" x2="22" y2="10"/>
                    </svg>
                    구매 내역
                </span><span class="menu-arrow">›</span>
            </button>
            <button type="button" class="menu-item" data-tab="posts">
                <span style="display:flex; align-items:center; gap:6px;">
                    <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5z"/>
                    </svg>
                    내 게시글
                </span><span class="menu-arrow">›</span>
            </button>
            <button type="button" class="menu-item" data-tab="ranking">
                <span style="display:flex; align-items:center; gap:6px;">
                    <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M8 21h8"/>
                        <path d="M12 17v4"/>
                        <path d="M7 4h10v5a5 5 0 0 1-10 0V4z"/>
                        <path d="M7 5H4a3 3 0 0 0 3 5"/>
                        <path d="M17 5h3a3 3 0 0 1-3 5"/>
                    </svg>
                    랭킹
                </span><span class="menu-arrow">›</span>
            </button>
        </nav>
    </aside>

    <!-- 우측 상세 컨텐츠 -->
    <main class="mypage-content">

        <!-- 회원 정보 -->
        <section class="content-panel" id="panel-info">
            <h2 class="panel-title" style="display:flex; align-items:center; gap:8px;">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="8" r="4"/>
                    <path d="M4 21c0-4.4 3.6-7 8-7s8 2.6 8 7"/>
                </svg>
                회원정보
            </h2>

            <div class="info-grid">
                <div class="info-field">
                    <label>이름</label>
                    <div class="info-box" th:text="${siteUser.name}">이름</div>
                </div>
                <div class="info-field">
                    <label>아이디</label>
                    <div class="info-box" th:text="${siteUser.username}">아이디</div>
                </div>
                <div class="info-field">
                    <label>이메일</label>
                    <div class="info-box" th:text="${siteUser.email}">이메일</div>
                </div>
                <div class="info-field">
                    <label>휴대폰</label>
                    <div class="info-box" th:text="${siteUser.phone}">휴대폰</div>
                </div>
                <div class="info-field">
                    <label>생년월일</label>
                    <div class="info-box" th:text="${siteUser.birth}">생년월일</div>
                </div>
                <div class="info-field">
                    <label>국적</label>
                    <div class="info-box" th:text="${siteUser.nationality != null ? siteUser.nationality : '미입력'}">국적</div>
                </div>
                <div class="info-field">
                    <label>가입일</label>
                    <div class="info-box"
                         th:text="${siteUser.joinDate != null ? #temporals.format(siteUser.joinDate, 'yyyy.MM.dd') : '-'}">가입일</div>
                </div>
                <div class="info-field">
                    <label>비밀번호</label>
                    <div class="info-box">••••••••</div>
                </div>
            </div>

            <button type="button" class="btn-edit-info">정보 수정하기</button>

            <div class="danger-row">
                <span class="danger-text">계정 탈퇴 시 모든 학습 기록이 삭제돼요.</span>
                <button type="button" class="btn-withdraw">회원 탈퇴</button>
            </div>
        </section>

        <!-- 학습 현황 -->
        <section class="content-panel" id="panel-study">
            <div class="panel-header-row">
                <h2 class="panel-title" style="display:flex; align-items:center; gap:8px;">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="20" x2="18" y2="10"/>
                        <line x1="12" y1="20" x2="12" y2="4"/>
                        <line x1="6" y1="20" x2="6" y2="14"/>
                    </svg>
                    학습 현황
                </h2>
            </div>
            <div class="empty-panel">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px; margin-right:4px;">
                    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                    <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                </svg>
                학습 현황 기능은 준비 중입니다
            </div>
        </section>

        <!-- 구매 내역 -->
        <section class="content-panel" id="panel-purchase">
            <h2 class="panel-title" style="display:flex; align-items:center; gap:8px;">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="5" width="20" height="14" rx="2"/>
                    <line x1="2" y1="10" x2="22" y2="10"/>
                </svg>
                구매 내역
            </h2>
            <div class="empty-panel">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px; margin-right:4px;">
                    <circle cx="9" cy="21" r="1"/>
                    <circle cx="18" cy="21" r="1"/>
                    <path d="M2.5 3h2l2.7 12.5a2 2 0 0 0 2 1.6h8.6a2 2 0 0 0 2-1.6L21 8H6"/>
                </svg>
                구매 내역 기능은 준비 중입니다
            </div>
        </section>

        <!-- 내 게시글 -->
        <section class="content-panel" id="panel-posts">
            <h2 class="panel-title" style="display:flex; align-items:center; gap:8px;">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5z"/>
                </svg>
                내 게시글
            </h2>

            <!-- 서브탭 -->
            <div class="subtab-bar">
                <button type="button" class="subtab-item active" data-subtab="myposts">내가 쓴 글</button>
                <button type="button" class="subtab-item" data-subtab="mycomments">내가 쓴 댓글</button>
                <button type="button" class="subtab-item" data-subtab="myinquiry">1:1 문의</button>
            </div>

            <!-- 내가 쓴 글 -->
            <div class="subtab-panel active" id="subtab-myposts">
                <div class="my-post-list" th:if="${!myPosts.empty}">
                    <a class="my-post-item" th:each="post : ${myPosts.content}"
                       th:href="@{/community/{id}(id=${post.id})}">
                        <span class="my-post-tag" th:text="${post.category.description}">태그</span>
                        <span class="my-post-title" th:text="${post.title}">제목</span>
                        <span class="my-post-date" th:text="${#temporals.format(post.createdDate, 'yyyy.MM.dd')}">날짜</span>
                    </a>
                </div>
                <div class="empty-panel" th:if="${myPosts.empty}">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px; margin-right:4px;">
                        <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5z"/>
                    </svg>
                    아직 작성한 게시글이 없어요
                </div>

                <!-- ★ 페이지네이션 -->
                <div class="my-post-pagination" th:if="${!myPosts.empty}">
                    <a th:href="@{/siteUser/mypage(postPage=${myPosts.number - 1}, tab='posts', subtab='myposts')}"
                       th:classappend="${myPosts.first} ? 'disabled'"
                       class="page-btn page-prev">‹</a>

                    <a th:each="i : ${#numbers.sequence(0, myPosts.totalPages - 1)}"
                       th:href="@{/siteUser/mypage(postPage=${i}, tab='posts', subtab='myposts')}"
                       th:text="${i + 1}"
                       th:classappend="${i == myPosts.number} ? 'active'"
                       class="page-btn"></a>

                    <a th:href="@{/siteUser/mypage(postPage=${myPosts.number + 1}, tab='posts', subtab='myposts')}"
                       th:classappend="${myPosts.last} ? 'disabled'"
                       class="page-btn page-next">›</a>
                </div>
            </div>

            <!-- 내가 쓴 댓글 -->
            <div class="subtab-panel" id="subtab-mycomments">
                <div class="my-post-list" th:if="${!myComments.empty}">
                    <a class="my-comment-item" th:each="comment : ${myComments.content}"
                       th:href="@{/community/{id}(id=${comment.community.id})}">
                        <div class="my-comment-content" th:text="${comment.content}">댓글 내용</div>
                        <div class="my-comment-meta">
                            <span th:text="'원글: ' + ${comment.community.title}">원글 제목</span>
                            <span th:text="${#temporals.format(comment.createdDate, 'yyyy.MM.dd')}">날짜</span>
                        </div>
                    </a>
                </div>
                <div class="empty-panel" th:if="${myComments.empty}">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px; margin-right:4px;">
                        <path d="M4 4h16a1 1 0 0 1 1 1v11a1 1 0 0 1-1 1H9l-5 4v-4H4a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z"/>
                    </svg>
                    아직 작성한 댓글이 없어요
                </div>

                <!-- ★ 댓글 페이지네이션 -->
                <div class="my-post-pagination" th:if="${!myComments.empty}">
                    <a th:href="@{/siteUser/mypage(commentPage=${myComments.number - 1}, tab='posts', subtab='mycomments')}"
                       th:classappend="${myComments.first} ? 'disabled'"
                       class="page-btn page-prev">‹</a>

                    <a th:each="i : ${#numbers.sequence(0, myComments.totalPages - 1)}"
                       th:href="@{/siteUser/mypage(commentPage=${i}, tab='posts', subtab='mycomments')}"
                       th:text="${i + 1}"
                       th:classappend="${i == myComments.number} ? 'active'"
                       class="page-btn"></a>

                    <a th:href="@{/siteUser/mypage(commentPage=${myComments.number + 1}, tab='posts', subtab='mycomments')}"
                       th:classappend="${myComments.last} ? 'disabled'"
                       class="page-btn page-next">›</a>
                </div>
            </div>

            <!-- 1:1 문의 -->
            <div class="subtab-panel" id="subtab-myinquiry">

                <div class="my-inquiry-header">
                    <a th:href="@{/qna/write}" class="btn-inquiry-write">
                        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px; margin-right:3px;">
                            <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5z"/>
                        </svg>
                        문의하기
                    </a>
                </div>

                <div class="my-post-list" th:if="${!myInquiries.empty}">
                    <a class="my-inquiry-item" th:each="inquiry : ${myInquiries.content}"
                       th:href="@{/qna/{id}(id=${inquiry.id})}">
            <span class="inquiry-status"
                  th:text="${inquiry.status.description}"
                  th:classappend="${inquiry.status.name() == 'ANSWERED'} ? 'answered' : 'pending'"></span>
                        <span class="my-post-title" th:text="${inquiry.title}">제목</span>
                        <span class="my-post-date" th:text="${#temporals.format(inquiry.createdDate, 'yyyy.MM.dd')}">날짜</span>
                    </a>
                </div>
                <div class="empty-panel" th:if="${myInquiries.empty}">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px; margin-right:4px;">
                        <path d="M4 5h16a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1z"/>
                        <polyline points="3 7 12 13 21 7"/>
                    </svg>
                    아직 등록한 문의가 없어요
                </div>

                <!-- ★ 문의 페이지네이션 -->
                <div class="my-post-pagination" th:if="${!myInquiries.empty}">
                    <a th:href="@{/siteUser/mypage(inquiryPage=${myInquiries.number - 1}, tab='posts', subtab='myinquiry')}"
                       th:classappend="${myInquiries.first} ? 'disabled'"
                       class="page-btn page-prev">‹</a>

                    <a th:each="i : ${#numbers.sequence(0, myInquiries.totalPages - 1)}"
                       th:href="@{/siteUser/mypage(inquiryPage=${i}, tab='posts', subtab='myinquiry')}"
                       th:text="${i + 1}"
                       th:classappend="${i == myInquiries.number} ? 'active'"
                       class="page-btn"></a>

                    <a th:href="@{/siteUser/mypage(inquiryPage=${myInquiries.number + 1}, tab='posts', subtab='myinquiry')}"
                       th:classappend="${myInquiries.last} ? 'disabled'"
                       class="page-btn page-next">›</a>
                </div>
            </div>
        </section>

        <!-- 랭킹 -->
        <section class="content-panel" id="panel-ranking">
            <h2 class="panel-title" style="display:flex; align-items:center; gap:8px;">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8 21h8"/>
                    <path d="M12 17v4"/>
                    <path d="M7 4h10v5a5 5 0 0 1-10 0V4z"/>
                    <path d="M7 5H4a3 3 0 0 0 3 5"/>
                    <path d="M17 5h3a3 3 0 0 1-3 5"/>
                </svg>
                랭킹
            </h2>
            <div class="empty-panel">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px; margin-right:4px;">
                    <path d="M8 21h8"/>
                    <path d="M12 17v4"/>
                    <path d="M7 4h10v5a5 5 0 0 1-10 0V4z"/>
                    <path d="M7 5H4a3 3 0 0 0 3 5"/>
                    <path d="M17 5h3a3 3 0 0 1-3 5"/>
                </svg>
                랭킹 기능은 준비 중입니다
            </div>
        </section>

    </main>
</div>

<div th:replace="~{layout/footer :: footer}"></div>

<script th:src="@{/js/mypage.js}"></script>
</body>
</html>
