<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>정보 수정 | 끼역띠귿</title>
  <link rel="stylesheet" th:href="@{/css/layout/navbar.css}" />
  <link rel="stylesheet" th:href="@{/css/layout/footer.css}" />
  <link rel="stylesheet" th:href="@{/css/siteuser/sujung.css}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
</head>
<body>

<div class="bg-orbs">
  <div class="orb o1"></div>
  <div class="orb o2"></div>
</div>

<!-- 네브바 -->
<div th:replace="~{layout/navbar :: navbar(currentMenu='mypage')}"></div>

<div class="main">

  <div class="page-header">
    <a class="btn-back" th:href="@{/siteUser/view}">← 내 정보</a>
    <h1>정보 수정</h1>
  </div>

  <!-- ★ Thymeleaf 성공/오류 메시지 -->
  <div class="alert-success" th:if="${successMsg}" th:text="${successMsg}"></div>
  <div class="alert-error"   th:if="${errorMsg}"   th:text="${errorMsg}"></div>

  <div class="edit-card">
    <form th:action="@{/siteUser/sujungProc}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

      <!-- 수정 불가 항목 -->
      <div class="form-section">
        <div class="section-label">수정 불가 항목</div>
        <div class="field">
          <label>아이디</label>
          <input type="text" th:value="${siteUser.username}" readonly />
        </div>
        <div class="field">
          <label>이름</label>
          <input type="text" th:value="${siteUser.name}" readonly />
        </div>
        <div class="field">
          <label>이메일</label>
          <input type="text" th:value="${siteUser.email}" readonly />
        </div>
        <div class="field">
          <label>생년월일</label>
          <input type="text" th:value="${siteUser.birth}" readonly />
        </div>
      </div>

      <!-- 수정 가능 항목 -->
      <div class="form-section">
        <div class="section-label">수정 가능 항목</div>

        <div class="field">
          <label for="phone">전화번호</label>
          <input type="tel" id="phone" name="phone"
                 th:value="${siteUser.phone}"
                 placeholder="010-0000-0000"
                 oninput="formatPhone(this)" />
        </div>

        <div class="field">
          <label for="nationality">국적</label>
          <select id="nationality" name="nationality">
            <option value="">선택 안함</option>
            <option value="한국" th:selected="${siteUser.nationality == '한국'}">🇰🇷 대한민국</option>
            <option value="중국" th:selected="${siteUser.nationality == '중국'}">🇨🇳 중국</option>
            <option value="베트남" th:selected="${siteUser.nationality == '베트남'}">🇻🇳 베트남</option>
            <option value="필리핀" th:selected="${siteUser.nationality == '필리핀'}">🇵🇭 필리핀</option>
            <option value="일본" th:selected="${siteUser.nationality == '일본'}">🇯🇵 일본</option>
            <option value="미국" th:selected="${siteUser.nationality == '미국'}">🇺🇸 미국</option>
            <option value="몽골" th:selected="${siteUser.nationality == '몽골'}">🇲🇳 몽골</option>
            <option value="태국" th:selected="${siteUser.nationality == '태국'}">🇹🇭 태국</option>
            <option value="인도네시아" th:selected="${siteUser.nationality == '인도네시아'}">🇮🇩 인도네시아</option>
            <option value="기타" th:selected="${siteUser.nationality == '기타'}">기타</option>
          </select>
        </div>
      </div>

      <!-- 비밀번호 변경 -->
      <div class="form-section">
        <div class="section-label">비밀번호 변경 <span style="font-size:10px;color:var(--ink-faint);text-transform:none;letter-spacing:0;">(변경 시에만 입력)</span></div>

        <div class="field">
          <label for="currentPassword">현재 비밀번호</label>
          <input type="password" id="currentPassword" name="currentPassword" placeholder="현재 비밀번호 입력" />
        </div>

        <div class="field">
          <label for="newPassword">새 비밀번호</label>
          <input type="password" id="newPassword" name="newPassword"
                 placeholder="8자 이상, 영문+숫자 조합"
                 oninput="checkPwStrength(this.value)" />
          <div class="pw-strength" id="pw-strength" style="display:none;">
            <div class="pw-bars">
              <div class="pw-bar" id="bar1"></div>
              <div class="pw-bar" id="bar2"></div>
              <div class="pw-bar" id="bar3"></div>
              <div class="pw-bar" id="bar4"></div>
            </div>
            <span class="pw-label" id="pw-label"></span>
          </div>
        </div>

        <div class="field">
          <label for="newPasswordChk">새 비밀번호 확인</label>
          <input type="password" id="newPasswordChk" name="newPasswordChk"
                 placeholder="새 비밀번호 재입력"
                 oninput="checkPwMatch()" />
          <span class="field-hint" id="pw-match-msg"></span>
        </div>
      </div>

      <div class="form-actions">
        <a class="btn-cancel" th:href="@{/siteUser/view}">취소</a>
        <button type="submit" class="btn-submit">수정 완료</button>
      </div>
    </form>
  </div>
</div>

<!-- 푸터 -->
<div th:replace="~{layout/footer :: footer}"></div>

<script>
  function formatPhone(input) {
    let val = input.value.replace(/\D/g, '');
    if (val.length <= 3) input.value = val;
    else if (val.length <= 7) input.value = val.slice(0,3) + '-' + val.slice(3);
    else input.value = val.slice(0,3) + '-' + val.slice(3,7) + '-' + val.slice(7,11);
  }

  function checkPwStrength(val) {
    const el = document.getElementById('pw-strength');
    const label = document.getElementById('pw-label');
    const bars = ['bar1','bar2','bar3','bar4'].map(id => document.getElementById(id));
    if (!val) { el.style.display = 'none'; return; }
    el.style.display = 'block';
    bars.forEach(b => b.className = 'pw-bar');
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Za-z]/.test(val) && /[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    if (val.length >= 12) score++;
    const configs = [
      { cls: 'weak',   text: '약한 비밀번호', count: 1 },
      { cls: 'weak',   text: '약한 비밀번호', count: 1 },
      { cls: 'medium', text: '보통 강도',     count: 2 },
      { cls: 'strong', text: '강한 비밀번호 👍', count: 4 },
    ];
    const cfg = configs[Math.min(score, 3)];
    for (let i = 0; i < cfg.count; i++) bars[i].classList.add(cfg.cls);
    label.textContent = cfg.text;
  }

  function checkPwMatch() {
    const pw  = document.getElementById('newPassword').value;
    const pw2 = document.getElementById('newPasswordChk').value;
    const msg = document.getElementById('pw-match-msg');
    if (!pw2) { msg.textContent = ''; return; }
    if (pw === pw2) { msg.textContent = '✓ 비밀번호가 일치해요'; msg.style.color = 'var(--mint-dark)'; }
    else            { msg.textContent = '비밀번호가 일치하지 않아요'; msg.style.color = '#EF4444'; }
  }
</script>

</body>
</html>
