<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>카테고리 추가 | 끼역띠귿</title>
  <link rel="stylesheet" th:href="@{/css/layout/navbar.css}" />
  <link rel="stylesheet" th:href="@{/css/layout/footer.css}" />
  <link rel="stylesheet" th:href="@{/css/category/chuga.css}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
</head>
<body>

<div class="bg-orbs"><div class="orb o1"></div><div class="orb o2"></div></div>

<!-- 네브바 -->
<div th:replace="~{layout/navbar :: navbar(currentMenu='lectures')}"></div>

<div class="page-header">
  <h1>카테고리 추가</h1>
  <p>강의 목록 상단 탭에 새 카테고리를 추가해요</p>
</div>

<div class="cw-container">
  <div class="cw-card">
    <form id="categoryForm" th:action="@{/category/chuga}" th:object="${categoryDTO}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

      <div class="field">
        <label for="name">카테고리명 <span class="required">*</span></label>
        <input type="text" id="name" th:field="*{name}"
               placeholder="예: 5단계 발음" maxlength="20" required />
      </div>

      <div class="field">
        <label for="orderNum">순서 <span class="field-optional">(선택, 비우면 맨 뒤에 추가)</span></label>
        <input type="number" id="orderNum" th:field="*{orderNum}"
               placeholder="예: 5" min="1" />
      </div>

      <div class="field">
        <label>미리보기</label>
        <div class="cat-tab-preview">
          <span class="tab-preview-chip" id="previewChip">카테고리명</span>
        </div>
      </div>

      <div class="cw-notice">📌 등록한 카테고리는 강의 목록 상단 탭에 바로 노출돼요.</div>

      <div class="cw-actions">
        <a th:href="@{/category/list}" class="btn-cancel">취소</a>
        <button type="submit" class="btn-submit">카테고리 등록</button>
      </div>
    </form>
  </div>
</div>

<!-- 푸터 -->
<div th:replace="~{layout/footer :: footer}"></div>

<!-- 등록 확인 모달 -->
<div class="cw-confirm-overlay" id="cwConfirmOverlay">
  <div class="cw-confirm-card">
    <div class="cw-confirm-icon">✅</div>
    <div class="cw-confirm-title">카테고리가 등록되었어요</div>
    <div class="cw-confirm-desc">강의 목록 상단 탭에서 바로 확인할 수 있어요.</div>
    <button type="button" class="cw-confirm-btn" id="cwConfirmBtn">확인</button>
  </div>
</div>

<script>
  var nameInput = document.getElementById('name');
  var previewChip = document.getElementById('previewChip');
  nameInput.addEventListener('input', function () {
    previewChip.textContent = nameInput.value || '카테고리명';
  });

  document.getElementById('categoryForm').addEventListener('submit', function (e) {
    e.preventDefault();
    var form = this;
    var overlay = document.getElementById('cwConfirmOverlay');
    overlay.classList.add('active');
    document.getElementById('cwConfirmBtn').addEventListener('click', function () {
      form.submit();
    }, { once: true });
  });
</script>

</body>
</html>
