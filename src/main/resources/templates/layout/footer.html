<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link th:href="@{/css/layout/footer.css}" rel="stylesheet" />
</head>
<body>

<!--
  ================================
  사용법 (다른 페이지에서 삽입):
  <div th:replace="~{fragments/footer :: footer}"></div>
  ================================
-->

<footer th:fragment="footer" class="site-footer">
  <div class="footer-inner">

    <!-- 상단: 로고 + 링크 -->
    <div class="footer-top">

      <!-- 브랜드 -->
      <div class="footer-brand">
        <a class="footer-logo" th:href="@{/}">
          <span class="logo-pixel">끼</span>
          <span class="logo-text">끼역띠귿</span>
        </a>
        <p class="footer-tagline">외국인과 다문화 가족을 위한<br>한국어 학습 플랫폼</p>
        <div class="footer-sns">
          <a th:href="@{/}" class="sns-btn" aria-label="인스타그램">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
              <circle cx="12" cy="12" r="4"/>
              <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"/>
            </svg>
          </a>
          <a th:href="@{/}" class="sns-btn" aria-label="유튜브">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path d="M22.5 6.5a2.83 2.83 0 0 0-2-2C18.9 4 12 4 12 4s-6.9 0-8.5.5a2.83 2.83 0 0 0-2 2C1 8.1 1 12 1 12s0 3.9.5 5.5a2.83 2.83 0 0 0 2 2C5.1 20 12 20 12 20s6.9 0 8.5-.5a2.83 2.83 0 0 0 2-2C23 15.9 23 12 23 12s0-3.9-.5-5.5z"/>
              <polygon points="10 15.5 16 12 10 8.5 10 15.5" fill="currentColor" stroke="none"/>
            </svg>
          </a>
        </div>
      </div>

      <!-- 링크 컬럼들 -->
      <div class="footer-links">

        <div class="footer-col">
          <h4>학습</h4>
          <ul>
            <li><a th:href="@{/lectures}">동영상 강의</a></li>
            <li><a th:href="@{/game}">학습 게임</a></li>
            <li><a th:href="@{/pricing}">구독 안내</a></li>
          </ul>
        </div>

        <div class="footer-col">
          <h4>커뮤니티</h4>
          <ul>
            <li><a th:href="@{/notices}">공지사항</a></li>
            <li><a th:href="@{/board}">자유게시판</a></li>
            <li><a th:href="@{/faq}">자주 묻는 질문</a></li>
            <li><a th:href="@{/qna}">1:1 질문하기</a></li>
          </ul>
        </div>

        <div class="footer-col">
          <h4>고객지원</h4>
          <ul>
            <li><a th:href="@{/terms}">이용약관</a></li>
            <li><a th:href="@{/privacy}">개인정보처리방침</a></li>
            <li><a th:href="@{/mypage}">마이페이지</a></li>
          </ul>
        </div>

      </div>
    </div>

    <!-- 구분선 -->
    <div class="footer-divider"></div>

    <!-- 하단: 카피라이트 -->
    <div class="footer-bottom">
      <p class="copyright">© 2025 끼역띠귿. All rights reserved.</p>
      <p class="footer-info">사업자등록번호 123-45-67890 &nbsp;|&nbsp; 대표자 홍길동 &nbsp;|&nbsp; 이메일 help@kkiyeok.com</p>
    </div>

  </div>
</footer>


</body>
</html>
