<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<!--
  ================================
  사용법 (다른 페이지에서 삽입):
  <div th:replace="~{layout/navbar :: navbar(currentMenu='lectures')}"></div>

  currentMenu 값 목록:
    home | notices | community | event | lectures | game | faq | qna | qnaMain | mypage
  ================================
-->

<nav th:fragment="navbar(currentMenu)" class="navbar">
  <link th:href="@{/css/layout/navbar.css}" rel="stylesheet">
  <div class="navbar-inner">

    <!-- 로고 -->
    <a class="navbar-logo" th:href="@{/}">
      <span class="logo-pixel">끼</span>
      <span class="logo-text">끼역띠귿</span>
    </a>

    <!-- 햄버거 (모바일) -->
    <button class="navbar-toggle" id="navToggle" aria-label="메뉴 열기">
      <span></span><span></span><span></span>
    </button>

    <!-- 메뉴 -->
    <ul class="navbar-menu" id="navMenu">

      <!-- 공지사항 -->
      <li th:classappend="${currentMenu == 'notice'} ? 'active'">
        <a th:href="@{/notice/list}">공지사항</a>
      </li>

      <!-- 커뮤니티 -->
      <li th:classappend="${currentMenu == 'community'} ? 'active'">
        <a th:href="@{/community}">커뮤니티</a>
      </li>

      <!-- 이벤트 -->
      <li th:classappend="${currentMenu == 'event'} ? 'active'">
        <a th:href="@{/event}">이벤트</a>
      </li>

      <!-- 학습센터 드롭다운 -->
      <li class="has-dropdown" th:classappend="${currentMenu == 'lectures' or currentMenu == 'game'} ? 'active'">
        <a th:href="@{/category/main}" class="dropdown-trigger">
          학습센터
          <svg class="arrow-icon" viewBox="0 0 10 6" fill="none">
            <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </a>
        <ul class="dropdown-menu dropdown-menu-card">
          <li>
            <a th:href="@{/category/list}" th:classappend="${currentMenu == 'category'} ? 'active'">
              <span class="drop-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M12 3L2 8l10 5 8-4.09V15h2V8L12 3z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
                  <path d="M6 10.5V15c0 1.5 2.5 3.5 6 3.5s6-2 6-3.5v-4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
              <div>
                <strong>동영상 강의</strong>
                <small>단계별 한국어 강의</small>
              </div>
            </a>
          </li>
          <li>
            <a th:href="@{/game}" th:classappend="${currentMenu == 'game'} ? 'active'">
              <span class="drop-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <rect x="2" y="7" width="20" height="11" rx="4" stroke="currentColor" stroke-width="1.5"/>
                  <path d="M7 10v4M5 12h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                  <circle cx="16" cy="10.5" r="1" fill="currentColor"/>
                  <circle cx="18.5" cy="13" r="1" fill="currentColor"/>
                </svg>
              </span>
              <div>
                <strong>학습 게임</strong>
                <small>픽셀 RPG로 배우기</small>
              </div>
            </a>
          </li>
        </ul>
      </li>

      <!-- 질문센터 드롭다운 -->
      <li class="has-dropdown" th:classappend="${currentMenu == 'faq' or currentMenu == 'qna' or currentMenu == 'qnaMain'} ? 'active'">
        <a th:href="@{/qna/main}" class="dropdown-trigger">
          질문센터
          <svg class="arrow-icon" viewBox="0 0 10 6" fill="none">
            <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </a>
        <ul class="dropdown-menu dropdown-menu-card">
          <li>
            <a th:href="@{/faq/list}" th:classappend="${currentMenu == 'faq'} ? 'active'">
              <span class="drop-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/>
                  <path d="M9.5 9.3c0-1.4 1.1-2.5 2.5-2.5s2.5 1 2.5 2.3c0 1.5-2.5 1.7-2.5 3.7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  <circle cx="12" cy="16.3" r="1" fill="currentColor"/>
                </svg>
              </span>
              <div>
                <strong>자주 묻는 질문</strong>
                <small>FAQ</small>
              </div>
            </a>
          </li>
          <li>
            <a th:href="@{/qna/write}" th:classappend="${currentMenu == 'qna'} ? 'active'">
              <span class="drop-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <rect x="3" y="5" width="18" height="14" rx="2.5" stroke="currentColor" stroke-width="1.5"/>
                  <path d="M4 7l8 6 8-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </span>
              <div>
                <strong>1:1 질문하기</strong>
                <small>강사에게 직접 질문</small>
              </div>
            </a>
          </li>
        </ul>
      </li>

    </ul>

    <!-- 우측 버튼 영역 -->
    <div class="navbar-auth">

      <!-- 비로그인 상태: 로그인 + 회원가입 버튼 -->
      <th:block sec:authorize="isAnonymous()">
        <a class="btn-login" th:href="@{/siteUser/login}">로그인</a>
        <a class="btn-signup" th:href="@{/siteUser/chuga}">회원가입</a>
      </th:block>

      <!-- 로그인 상태 (관리자): 유저이름 클릭 시 관리자 대시보드로 -->
      <th:block sec:authorize="hasRole('ADMIN')">
        <a class="user-chip" th:href="@{/admin}">
          <span class="user-avatar"
                th:text="${#strings.substring(#authentication.name, 0, 1)}">U</span>
          <span class="user-name" sec:authentication="name">사용자</span>
          <span class="user-suffix">님</span>
        </a>
        <form th:action="@{/logout}" method="post" style="display:inline;">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <button type="submit" class="btn-logout">로그아웃</button>
        </form>
      </th:block>

      <!-- 로그인 상태 (일반 유저): 유저이름 클릭 시 마이페이지로 -->
      <th:block sec:authorize="isAuthenticated() and !hasRole('ADMIN')">
        <a class="user-chip" th:href="@{/siteUser/mypage}">
          <span class="user-avatar"
                th:text="${#strings.substring(#authentication.name, 0, 1)}">U</span>
          <span class="user-name" sec:authentication="name">사용자</span>
          <span class="user-suffix">님</span>
        </a>
        <form th:action="@{/logout}" method="post" style="display:inline;">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <button type="submit" class="btn-logout">로그아웃</button>
        </form>
      </th:block>

    </div>
  </div>

  <script th:inline="javascript">
    document.getElementById('navToggle')?.addEventListener('click', () => {
      document.getElementById('navMenu')?.classList.toggle('open');
    });
    document.querySelectorAll('.has-dropdown .dropdown-trigger').forEach(trigger => {
      trigger.addEventListener('click', e => {
        if (window.innerWidth <= 768) {
          e.preventDefault();
          trigger.closest('.has-dropdown').classList.toggle('open');
        }
      });
    });
    document.addEventListener('click', e => {
      if (!e.target.closest('.has-dropdown')) {
        document.querySelectorAll('.has-dropdown.open').forEach(el => el.classList.remove('open'));
      }
    });
  </script>

</nav>

</body>
</html>
