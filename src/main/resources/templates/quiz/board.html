<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>끼역띠귿 — 퀴즈</title>
  <link rel="stylesheet" th:href="@{/css/layout/navbar.css}" />
  <link rel="stylesheet" th:href="@{/css/layout/footer.css}" />
  <link rel="stylesheet" th:href="@{/css/quiz/board.css}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />

</head>
<body>

<div class="bg-orbs"><div class="orb o1"></div><div class="orb o2"></div></div>

<!-- 네브바 -->
<div th:replace="~{layout/navbar :: navbar(currentMenu='quiz')}"></div>

<!-- 헤더 -->
<div class="page-header">
  <div class="page-header-text">
    <h1>퀴즈</h1>
    <p>강의가 끝나면 가볍게 연습하고, 단계가 끝나면 모의고사로 실력을 확인해보세요 ✏️</p>
  </div>

  <div class="summary-box">
    <div class="sb-item">
      <div class="sb-num" th:text="${quizSummary.totalCount} + '개'">186개</div>
      <div class="sb-label">전체 문제은행</div>
    </div>
    <div class="sb-divider"></div>
    <div class="sb-item">
      <div class="sb-num" th:text="${quizSummary.avgRate} + '%'">82%</div>
      <div class="sb-label">평균 정답률</div>
    </div>
    <div class="sb-divider"></div>
    <div class="sb-item">
      <div class="sb-num" th:text="${quizSummary.examCount} + '회'">1회</div>
      <div class="sb-label">모의고사 응시</div>
    </div>
  </div>
</div>

<div class="main-wrap">

  <!-- 탭 전환 -->
  <div class="main-tabs">
    <button class="main-tab active" data-tab="practice">연습 퀴즈</button>
    <button class="main-tab" data-tab="exam">모의고사</button>
  </div>

  <!-- ══════════ 연습 퀴즈 ══════════ -->
  <div class="tab-panel show" id="panel-practice">
    <div class="practice-card">
      <!-- /*[[ 연습 퀴즈 목록 루프 ]]*/ -->
      <div class="practice-row" th:each="quiz : ${practiceList}">
        <span class="pr-stage-badge" th:text="${quiz.stageLabel}">1단계</span>
        <div class="pr-main">
          <div class="pr-title" th:text="${quiz.title}">퀴즈 제목</div>
          <div class="pr-sub">
            문제은행 <b style="color:var(--navy)" th:text="${quiz.poolCount}">20</b>개 중
            <b style="color:var(--navy)" th:text="${quiz.questionCount}">5</b>문항 랜덤 출제
          </div>
        </div>
        <div th:if="${quiz.lastScore != null}"
             class="pr-score" th:text="${quiz.lastScore} + '점'">90점</div>
        <div th:unless="${quiz.lastScore != null}"
             class="pr-score none">미응시</div>
        <a th:href="@{/quiz/play(quizId=${quiz.id},type='practice')}"
           class="pr-btn"
           th:text="${quiz.lastScore != null} ? '다시 풀기' : '풀어보기'">풀어보기</a>
      </div>
    </div>
  </div>

  <!-- ══════════ 모의고사 ══════════ -->
  <div class="tab-panel" id="panel-exam">

    <div class="exam-grid">
      <div th:each="exam : ${examList}"
           th:classappend="${exam.locked} ? 'locked' : (exam.selected ? 'selected' : '')"
           class="exam-card"
           th:data-exam="${exam.id}"
           th:onclick="${exam.locked} ? '' : 'selectExam(this,' + exam.id + ')'">
        <span class="exam-stage-num" th:text="${exam.stageLabel}">1단계</span>
        <div class="exam-title" th:text="${exam.title}">모의고사</div>
        <div class="exam-pool-info">
          문제은행 <b th:text="${exam.poolCount}">40</b>개 중<br/>
          <b th:text="${exam.questionCount}">15</b>문항 랜덤 출제
        </div>
        <div th:if="${exam.locked}"    class="exam-status es-locked"    th:text="'🔒 ' + exam.lockReason">🔒 잠김</div>
        <div th:if="${!exam.locked and exam.lastScore != null}" class="exam-status es-done"
             th:text="'완료 · ' + exam.lastScore + '점'">완료</div>
        <div th:if="${!exam.locked and exam.lastScore == null}" class="exam-status es-available">응시 가능</div>
      </div>
    </div>

    <!-- 결과 상세 패널 -->
    <div class="result-panel">
      <div class="rp-header">
        <h3 th:text="${examResult.title} + ' — 최근 응시 결과'">모의고사 결과</h3>
        <span th:text="${examResult.takenAt} + ' 응시 · ' + ${examResult.totalCount} + '문항 출제'">응시일</span>
      </div>

      <div class="rp-top">
        <div class="donut">
          <div class="donut-inner">
            <div class="donut-pct" th:text="${examResult.rate} + '%'">87%</div>
            <div class="donut-label">정답률</div>
          </div>
        </div>

        <div class="rp-stats">
          <div class="rps-item">
            <div class="rps-num correct" th:text="${examResult.correctCount}">13</div>
            <div class="rps-label">맞은 문항</div>
          </div>
          <div class="rps-item">
            <div class="rps-num wrong" th:text="${examResult.wrongCount}">2</div>
            <div class="rps-label">틀린 문항</div>
          </div>
          <div class="rps-item">
            <div class="rps-num" th:text="${examResult.score} + '점'">87점</div>
            <div class="rps-label">총점 (100점 만점)</div>
          </div>
        </div>

        <a th:href="@{/quiz/play(examId=${examResult.examId},type='exam')}" class="rp-retry-btn">다시 응시하기</a>
      </div>

      <div class="rp-divider"></div>

      <div class="rp-question-grid">
        <div th:each="cell, stat : ${examResult.cells}"
             th:classappend="${cell.correct} ? 'ok' : 'no'"
             class="rq-cell"
             th:text="${stat.index + 1}">1</div>
      </div>

      <div class="rp-history-note">🔄 모의고사는 응시할 때마다 문제은행에서 새로 랜덤 출제돼요. 재응시 시 문항이 달라질 수 있어요.</div>
    </div>

  </div>

</div>

<script>
  document.querySelectorAll('.main-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('show'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.tab).classList.add('show');
    });
  });

  document.querySelectorAll('.exam-card:not(.locked)').forEach(card => {
    card.addEventListener('click', () => {
      document.querySelectorAll('.exam-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
    });
  });
</script>

<!-- 푸터 -->
<div th:replace="~{layout/footer :: footer}"></div>

</body>
</html>
