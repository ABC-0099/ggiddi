<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>끼역띠귿 — 문의 상세</title>
  <link rel="stylesheet" th:href="@{/css/layout/navbar.css}" />
  <link rel="stylesheet" th:href="@{/css/layout/footer.css}" />
  <link rel="stylesheet" th:href="@{/css/inquiry/inquiry.css}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
</head>
<body>

<div class="bg-orbs"><div class="orb o1"></div><div class="orb o2"></div></div>
<div th:replace="~{layout/navbar :: navbar(currentMenu='')}"></div>

<div class="inquiry-container">
  <div class="inquiry-card">

        <span class="inquiry-status-badge"
              th:text="${inquiry.status.description}"
              th:classappend="${inquiry.status.name() == 'ANSWERED'} ? 'answered' : 'pending'"></span>

    <h1 class="inquiry-title" th:text="${inquiry.title}">제목</h1>
    <div class="inquiry-meta" th:text="${#temporals.format(inquiry.createdDate, 'yyyy.MM.dd HH:mm')}">날짜</div>

    <div class="inquiry-content" th:text="${inquiry.content}">문의 내용</div>

    <!-- 답변 -->
    <div class="inquiry-answer" th:if="${inquiry.answer != null}">
      <div class="answer-label">💬 관리자 답변</div>
      <div class="answer-content" th:text="${inquiry.answer}">답변 내용</div>
      <div class="answer-date" th:text="${#temporals.format(inquiry.answeredDate, 'yyyy.MM.dd HH:mm')}">답변일</div>
    </div>

    <!-- 관리자 답변 입력 폼 (관리자만, 미답변 상태일 때만) -->
    <div class="inquiry-answer-form" sec:authorize="hasRole('ADMIN')" th:if="${inquiry.answer == null}">
      <form th:action="@{/inquiry/{id}/answer(id=${inquiry.id})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <textarea name="answer" placeholder="답변을 입력하세요" required></textarea>
        <button type="submit" class="btn-submit">답변 등록</button>
      </form>
    </div>

    <div class="inquiry-back">
      <a th:href="@{/siteUser/mypage(tab='posts',subtab='myinquiry')}" class="btn-back">← 목록으로</a>
    </div>
  </div>
</div>

<div th:replace="~{layout/footer :: footer}"></div>
</body>
</html>
