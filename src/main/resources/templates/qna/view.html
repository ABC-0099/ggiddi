<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>끼역띠귿 — 문의 상세</title>
  <link rel="stylesheet" th:href="@{/css/layout/navbar.css}" />
  <link rel="stylesheet" th:href="@{/css/layout/footer.css}" />
  <link rel="stylesheet" th:href="@{/css/qna/view.css}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
</head>
<body>

<div class="bg-orbs"><div class="orb o1"></div><div class="orb o2"></div></div>
<div th:replace="~{layout/navbar :: navbar(currentMenu='')}"></div>

<div class="qna-container">
  <div class="qna-card">

        <span class="qna-status-badge"
              th:text="${qna.status.description}"
              th:classappend="${qna.status.name() == 'ANSWERED'} ? 'answered' : 'pending'"></span>

    <h1 class="qna-title" th:text="${qna.title}">제목</h1>
    <div class="qna-meta" th:text="${#temporals.format(qna.createdDate, 'yyyy.MM.dd HH:mm')}">날짜</div>

    <div class="qna-content" th:text="${qna.content}">문의 내용</div>

    <div class="qna-answer" th:if="${qna.answer != null}">
      <div class="answer-label" style="display:flex; align-items:center; gap:6px;">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16a1 1 0 0 1 1 1v11a1 1 0 0 1-1 1H9l-5 4v-4H4a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z"/>
        </svg>
        관리자 답변
      </div>
      <div class="answer-content" th:text="${qna.answer}">답변 내용</div>
      <div class="answer-date" th:text="${#temporals.format(qna.answeredDate, 'yyyy.MM.dd HH:mm')}">답변일</div>
    </div>

    <div class="qna-answer-form" sec:authorize="hasRole('ADMIN')" th:if="${qna.answer == null}">
      <form th:action="@{/qna/{id}/answer(id=${qna.id})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <textarea name="answer" placeholder="답변을 입력하세요" required></textarea>
        <button type="submit" class="btn-submit">답변 등록</button>
      </form>
    </div>

    <div class="qna-waiting" th:if="${qna.answer == null}" sec:authorize="!hasRole('ADMIN')">
      <div class="qna-waiting-icon">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="1.5" width="18" height="2" rx="1"/>
          <rect x="3" y="20.5" width="18" height="2" rx="1"/>
          <path d="M5.5 3.5v2a6.5 5.5 0 0 0 6.5 5.5a6.5 5.5 0 0 0 6.5-5.5v-2"/>
          <path d="M5.5 20.5v-2a6.5 5.5 0 0 1 6.5-5.5a6.5 5.5 0 0 1 6.5 5.5v2"/>
        </svg>
      </div>
      <p>아직 답변이 등록되지 않았어요.<br>빠른 시일 내에 답변드릴게요!</p>
    </div>

    <!-- 작성자 전용: 답변 대기 상태일 때만 수정/삭제 가능 -->
    <div class="qna-owner-actions"
         th:if="${#authentication.name == qna.author.username and qna.status.name() == 'PENDING'}">
      <a th:href="@{/qna/{id}/edit(id=${qna.id})}" class="btn-edit">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px; margin-right:3px;">
          <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5z"/>
        </svg>
        수정
      </a>
      <form th:action="@{/qna/{id}/delete(id=${qna.id})}" method="post" style="display:inline;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button type="submit" class="btn-delete"
                onclick="return confirm('정말 삭제할까요?')">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px; margin-right:3px;">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6"/>
            <path d="M14 11v6"/>
            <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
          </svg>
          삭제
        </button>
      </form>
    </div>

    <div class="qna-back">
      <a th:href="@{/siteUser/mypage(tab='posts',subtab='myinquiry')}" class="btn-back">← 돌아가기</a>
    </div>
  </div>
</div>

<div th:replace="~{layout/footer :: footer}"></div>
</body>
</html>
