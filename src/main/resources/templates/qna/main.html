<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>끼역띠귿 — 질문센터</title>
  <!-- 템플릿 경로: templates/qna/main.html -->
  <!-- 컨트롤러: @GetMapping("/qna") → return "qna/main" -->

  <link rel="stylesheet" th:href="@{/css/layout/navbar.css}" />
  <link rel="stylesheet" th:href="@{/css/layout/footer.css}" />
  <link rel="stylesheet" th:href="@{/css/qna/main.css}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
</head>
<body>

<div class="bg-orbs"><div class="orb o1"></div><div class="orb o2"></div></div>
<div th:replace="~{layout/navbar :: navbar(currentMenu='')}"></div>

<div class="page-header">
  <h1>질문센터</h1>
  <p>궁금한 점을 빠르게 해결해드려요</p>
</div>

<div class="qc-container">
  <a th:href="@{/faq/list}" class="qc-card">
    <div class="qc-icon">📖</div>
    <div class="qc-title">자주 묻는 질문</div>
    <div class="qc-desc">가장 많이 물어본 질문들을<br>바로 확인해보세요.</div>
    <div class="qc-arrow">FAQ 보러가기 →</div>
  </a>

  <a th:href="@{/qna/write}" class="qc-card">
    <div class="qc-icon">✉️</div>
    <div class="qc-title">1:1 질문하기</div>
    <div class="qc-desc">원하는 답을 못 찾았다면<br>직접 문의를 남겨주세요.</div>
    <div class="qc-arrow">문의하러 가기 →</div>
  </a>
</div>

<div th:replace="~{layout/footer :: footer}"></div>

</body>
</html>
