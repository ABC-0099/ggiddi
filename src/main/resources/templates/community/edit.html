<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>끼역띠귿 — 글 수정</title>
  <link rel="stylesheet" th:href="@{/css/layout/navbar.css}" />
  <link rel="stylesheet" th:href="@{/css/layout/footer.css}" />
  <link rel="stylesheet" th:href="@{/css/community/list.css}" />
  <link rel="stylesheet" th:href="@{/css/community/edit.css}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
</head>
<body>

<div class="bg-orbs"><div class="orb o1"></div><div class="orb o2"></div></div>
<div th:replace="~{layout/navbar :: navbar(currentMenu='community')}"></div>

<div class="page-header">
  <h1>글 수정</h1>
  <p>내용을 수정하고 저장하세요</p>
</div>

<div class="write-container">
  <div class="write-card">
    <form th:action="@{/community/{id}/edit(id=${postId})}" th:object="${communityDTO}"
          method="post" enctype="multipart/form-data" id="edit-form">

      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

      <div class="field">
        <label for="category">카테고리 <span class="required">*</span></label>
        <select id="category" th:field="*{category}" required>
          <option value="">카테고리를 선택하세요</option>
          <option value="CULTURAL">문화교류</option>
          <option value="REVIEW">학습후기</option>
          <option value="FREE">자유게시판</option>
        </select>
      </div>

      <div class="field">
        <label for="title">제목 <span class="required">*</span></label>
        <input type="text" id="title" th:field="*{title}"
               placeholder="제목을 입력하세요" maxlength="100" required />
      </div>

      <div class="field">
        <label for="content">내용 <span class="required">*</span></label>
        <textarea id="content" th:field="*{content}"
                  placeholder="내용을 입력하세요" maxlength="5000" required></textarea>
        <div class="char-count"><span id="content-count">0</span> / 5000</div>
      </div>

      <!-- 사진 -->
      <div class="field">
        <label>사진 첨부 <span class="field-hint-inline">선택 · 최대 5장 · 장당 10MB</span></label>

        <!-- 기존 이미지 -->
        <div th:if="${communityDTO.existingImages != null and !communityDTO.existingImages.isEmpty()}">
          <div class="existing-label">
            <span class="existing-badge">현재 사진</span>
          </div>
          <div class="existing-img-list" id="existing-img-list">
            <div class="img-thumb" th:each="img : ${communityDTO.existingImages}"
                 th:id="'existing-img-' + ${img.id}">
              <img th:src="@{${img.savedPath}}" th:alt="${img.originalName}" />
              <button type="button" class="img-remove"
                      th:onclick="'toggleDeleteFile(' + ${img.id} + ', \'existing-img-\')'">✕</button>
              <span class="img-name" th:text="${img.originalName}"></span>
              <input type="hidden" name="deleteFileIds" th:value="${img.id}"
                     th:id="'del-flag-' + ${img.id}" disabled />
            </div>
          </div>
        </div>

        <!-- 새 이미지 추가 -->
        <div class="add-file-divider" th:if="${communityDTO.existingImages != null and !communityDTO.existingImages.isEmpty()}">사진 추가</div>
        <div class="upload-zone img-zone" id="img-zone">
          <input type="file" id="imageFiles" name="imageFiles"
                 multiple accept="image/*" class="upload-input" />
          <div class="upload-placeholder" id="img-placeholder">
            <div class="upload-icon">🖼</div>
            <div class="upload-text">이미지를 드래그하거나 클릭해서 추가</div>
            <div class="upload-sub">JPG, PNG, GIF, WEBP</div>
          </div>
        </div>
        <div class="img-preview-list" id="img-preview-list"></div>
      </div>

      <!-- 파일 -->
      <div class="field">
        <label>파일 첨부 <span class="field-hint-inline">선택 · 최대 3개 · 파일당 20MB</span></label>

        <!-- 기존 첨부파일 -->
        <div th:if="${communityDTO.existingFiles != null and !communityDTO.existingFiles.isEmpty()}">
          <div class="existing-label">
            <span class="existing-badge attach">현재 첨부파일</span>
          </div>
          <ul class="existing-file-list" id="existing-file-list">
            <li class="file-item" th:each="file : ${communityDTO.existingFiles}"
                th:id="'existing-file-' + ${file.id}">
              <span class="file-icon">📄</span>
              <span class="file-name" th:text="${file.originalName}"></span>
              <span class="file-size"
                    th:text="${#numbers.formatDecimal(file.fileSize / 1048576.0, 1, 1)} + ' MB'"></span>
              <button type="button" class="file-remove"
                      th:onclick="'toggleDeleteFile(' + ${file.id} + ', \'existing-file-\')'">✕</button>
              <input type="hidden" name="deleteFileIds" th:value="${file.id}"
                     th:id="'del-flag-' + ${file.id}" disabled />
            </li>
          </ul>
        </div>

        <!-- 새 첨부파일 추가 -->
        <div class="add-file-divider" th:if="${communityDTO.existingFiles != null and !communityDTO.existingFiles.isEmpty()}">파일 추가</div>
        <div class="upload-zone file-zone" id="file-zone">
          <input type="file" id="attachFiles" name="attachFiles"
                 multiple
                 accept=".pdf,.ppt,.pptx,.doc,.docx,.hwp,.zip,.txt"
                 class="upload-input" />
          <div class="upload-placeholder" id="file-placeholder">
            <div class="upload-icon">📎</div>
            <div class="upload-text">파일을 드래그하거나 클릭해서 추가</div>
            <div class="upload-sub">PDF, PPT, DOC, HWP, ZIP, TXT</div>
          </div>
        </div>
        <ul class="file-list" id="file-list"></ul>
      </div>

      <div class="write-actions">
        <a th:href="@{/community/{id}(id=${postId})}" class="btn-cancel">취소</a>
        <button type="submit" class="btn-submit">✏️ 저장하기</button>
      </div>

    </form>
  </div>
</div>

<div th:replace="~{layout/footer :: footer}"></div>

<script>
  // ── 글자 수 카운터 ──
  const textarea = document.getElementById('content');
  const counter  = document.getElementById('content-count');
  counter.textContent = textarea.value.length;
  textarea.addEventListener('input', () => counter.textContent = textarea.value.length);

  // ── 드래그앤드롭 공통 ──
  function bindDrop(zoneId, inputId, handler) {
      const zone = document.getElementById(zoneId);
      zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
      zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
      zone.addEventListener('drop', e => { e.preventDefault(); zone.classList.remove('drag-over'); handler(e.dataTransfer.files); });
      zone.addEventListener('click', () => document.getElementById(inputId).click());
      document.getElementById(inputId).addEventListener('change', e => handler(e.target.files));
  }

  // ── 기존 파일 삭제 토글 ──
  function toggleDeleteFile(fileId, prefix) {
      const el = document.getElementById(prefix + fileId);
      const flag = document.getElementById('del-flag-' + fileId);
      const btn = el.querySelector('.img-remove, .file-remove');

      if (el.classList.contains('marked-delete')) {
          el.classList.remove('marked-delete');
          if (flag) flag.disabled = true;
          if (btn) btn.textContent = '✕';
      } else {
          el.classList.add('marked-delete');
          if (flag) flag.disabled = false;
          if (btn) btn.textContent = '↩';
      }
  }

  // 현재 남아있는(삭제 표시 안 된) 기존 파일 수 계산
  function countActiveExisting(selector) {
      return document.querySelectorAll(selector + ':not(.marked-delete)').length;
  }

  // ── 새 이미지 ──
  const MAX_IMG = 5;
  let imgFiles = [];

  bindDrop('img-zone', 'imageFiles', files => {
      const existingActive = countActiveExisting('#existing-img-list .img-thumb');
      const remaining = MAX_IMG - existingActive - imgFiles.length;
      const toAdd = Array.from(files).filter(f => f.type.startsWith('image/')).slice(0, Math.max(0, remaining));
      if (Array.from(files).length > remaining) alert(`사진은 최대 ${MAX_IMG}장까지 첨부할 수 있어요.`);
      imgFiles = [...imgFiles, ...toAdd];
      renderImgPreview();
  });

  function removeImg(idx) {
      imgFiles.splice(idx, 1);
      renderImgPreview();
  }

  function renderImgPreview() {
      const list = document.getElementById('img-preview-list');
      list.innerHTML = imgFiles.map((f, i) => {
          const url = URL.createObjectURL(f);
          return `<div class="img-thumb">
              <img src="${url}" alt="${f.name}" />
              <button type="button" class="img-remove" onclick="removeImg(${i})">✕</button>
              <span class="img-name">${f.name.slice(0,12)}${f.name.length>12?'…':''}</span>
          </div>`;
      }).join('');
  }

  // ── 새 첨부파일 ──
  const MAX_FILE = 3;
  let attachFiles = [];

  bindDrop('file-zone', 'attachFiles', files => {
      const existingActive = countActiveExisting('#existing-file-list .file-item');
      const remaining = MAX_FILE - existingActive - attachFiles.length;
      const toAdd = Array.from(files).slice(0, Math.max(0, remaining));
      if (Array.from(files).length > remaining) alert(`파일은 최대 ${MAX_FILE}개까지 첨부할 수 있어요.`);
      attachFiles = [...attachFiles, ...toAdd];
      renderFileList();
  });

  function removeFile(idx) {
      attachFiles.splice(idx, 1);
      renderFileList();
  }

  function fileIcon(name) {
      const ext = name.split('.').pop().toLowerCase();
      const map = { pdf:'📕', ppt:'📙', pptx:'📙', doc:'📘', docx:'📘', hwp:'📗', zip:'🗜', txt:'📄' };
      return map[ext] || '📄';
  }

  function renderFileList() {
      const list = document.getElementById('file-list');
      list.innerHTML = attachFiles.map((f, i) => `
          <li class="file-item">
              <span class="file-icon">${fileIcon(f.name)}</span>
              <span class="file-name">${f.name}</span>
              <span class="file-size">${(f.size/1024/1024).toFixed(1)} MB</span>
              <button type="button" class="file-remove" onclick="removeFile(${i})">✕</button>
          </li>`).join('');
  }

  // ── 폼 제출 전 파일 동기화 ──
  document.getElementById('edit-form').addEventListener('submit', () => {
      if (imgFiles.length > 0) {
          const dt = new DataTransfer();
          imgFiles.forEach(f => dt.items.add(f));
          document.getElementById('imageFiles').files = dt.files;
      }
      if (attachFiles.length > 0) {
          const dt = new DataTransfer();
          attachFiles.forEach(f => dt.items.add(f));
          document.getElementById('attachFiles').files = dt.files;
      }
  });
</script>
</body>
</html>
