<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>끼역띠귿 — 커뮤니티</title>
    <link rel="stylesheet" th:href="@{/css/layout/navbar.css}" />
    <link rel="stylesheet" th:href="@{/css/layout/footer.css}" />
    <link rel="stylesheet" th:href="@{/css/community/list.css}" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/community/chat.css}" />
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7/bundles/stomp.umd.min.js"></script>
</head>
<body th:attr="data-current-user=${#authentication.name != null and #authentication.name != 'anonymousUser'} ? ${#authentication.name} : ''">

<div class="bg-orbs"><div class="orb o1"></div><div class="orb o2"></div></div>
<div th:replace="~{layout/navbar :: navbar(currentMenu='community')}"></div>

<div class="page-header">
    <h1>커뮤니티</h1>
    <p>일상, 문화, 학습 후기를 자유롭게 나눠보세요</p>
</div>

<div class="filter-bar">
    <aside class="tabs">
        <button type="button" class="tab category-btn" data-category="ALL">전체</button>
        <button type="button" class="tab category-btn" data-category="CULTURAL">문화교류</button>
        <button type="button" class="tab category-btn" data-category="REVIEW">학습후기</button>
        <button type="button" class="tab category-btn" data-category="FREE">자유게시판</button>
    </aside>
</div>

<div class="toolbar">
    <div class="search-area">
        <div class="search-wrap">
            <span>🔍</span>
            <input type="text" id="search_kw" placeholder="제목, 내용, 태그로 검색" />
        </div>
        <button type="button" id="btn_search" class="search-btn">검색</button>
    </div>
    <div class="toolbar-right">
        <select class="sort-select" id="sort-select">
            <option value="newest">최신순</option>
            <option value="oldest">등록순</option>
        </select>
        <a th:href="@{/community/write}" class="write-btn">✏️ 글쓰기</a>
    </div>
</div>

<div class="post-wrap">
    <div class="info-box">🔔  커뮤니티 이용 시 욕설·비방·혐오 표현은 삼가 주세요. 타인을 존중하는 건강한 소통 문화를 만들어요.</div>

    <div class="post" th:each="post : ${postList}">
        <div class="post-top">
            <div class="post-avatar" th:text="${#strings.substring(post.author.username, 0, 1)}">리</div>
            <div>
                <div class="post-author" th:text="${post.author.username}">사용자</div>
                <div class="post-meta" th:text="${post.author.nationality + ' · ' + #temporals.format(post.createdDate, 'MM.dd HH:mm')}">시간</div>
            </div>
        </div>

        <a th:href="@{/community(category=${post.category})}"
           class="post-tag"
           th:text="${post.category.description}">태그</a>

        <a th:href="@{/community/{id}(id=${post.id})}">
            <div class="post-title" th:text="${post.title}">제목</div>
            <div class="post-text" th:text="${post.content}">내용</div>

            <!-- 대표 이미지 (첫 번째 첨부 이미지) -->
            <div class="post-image-wrap"
                 th:if="${!#lists.isEmpty(post.files) and post.files.?[fileType == 'IMAGE'].size() > 0}">
                <img th:src="@{${post.files.?[fileType == 'IMAGE'][0].savedPath}}"
                     th:alt="${post.title}" />
                <span class="post-image-count"
                      th:if="${post.files.?[fileType == 'IMAGE'].size() > 1}"
                      th:text="'+' + ${post.files.?[fileType == 'IMAGE'].size() - 1}"></span>
            </div>
        </a>

        <div class="post-footer">
            <a th:href="@{/community/{id}(id=${post.id})}" class="pf-action">
                💬 [[${#lists.size(post.comments)}]]
            </a>
            <span class="pf-action"
                  th:onclick="|navigator.clipboard.writeText(window.location.origin + '/community/' + ${post.id}).then(function(){ alert('링크가 복사되었습니다! 😊'); })|">
                ↗ 공유
            </span>
            <span class="pf-spacer"></span>
            <span class="pf-report"
                  th:attr="data-post-id=${post.id}"
                  onclick="openReportModal(this)">
                🚩 신고
            </span>
        </div>
    </div>
</div>

<!-- 신고 사유 모달 -->
<div class="report-overlay" id="report-overlay">
    <div class="report-modal">
        <div class="report-modal-head">
            <h3>게시글 신고</h3>
            <button type="button" class="report-close" onclick="closeReportModal()">✕</button>
        </div>
        <p class="report-modal-desc">신고 사유를 선택해주세요. 검토 후 적절한 조치가 이뤄집니다.</p>

        <div class="report-reasons">
            <label class="report-reason">
                <input type="radio" name="report-reason" value="SPAM" />
                <span>스팸 / 광고성 게시글</span>
            </label>
            <label class="report-reason">
                <input type="radio" name="report-reason" value="ABUSE" />
                <span>욕설 / 비방 / 혐오 표현</span>
            </label>
            <label class="report-reason">
                <input type="radio" name="report-reason" value="OBSCENE" />
                <span>음란물 / 선정적 콘텐츠</span>
            </label>
            <label class="report-reason">
                <input type="radio" name="report-reason" value="FALSE_INFO" />
                <span>허위 정보 / 사기</span>
            </label>
            <label class="report-reason">
                <input type="radio" name="report-reason" value="PRIVACY" />
                <span>개인정보 노출</span>
            </label>
            <label class="report-reason">
                <input type="radio" name="report-reason" value="ETC" />
                <span>기타</span>
            </label>
        </div>

        <textarea class="report-detail" id="report-detail"
                  placeholder="(선택) 신고 사유를 자세히 알려주세요"></textarea>

        <div class="report-modal-actions">
            <button type="button" class="report-cancel-btn" onclick="closeReportModal()">취소</button>
            <button type="button" class="report-submit-btn" onclick="submitReport()">신고 제출</button>
        </div>
    </div>
</div>

<!-- 플로팅 채팅 위젯 -->
<div class="chat-widget" sec:authorize="isAuthenticated()">

    <!-- 열기 버튼 -->
    <button type="button" class="chat-toggle-btn" id="chat-toggle-btn" onclick="toggleChat()">
        <span class="chat-toggle-icon">💬</span>
        <span class="chat-unread-badge" id="chat-unread-badge" style="display:none;">0</span>
    </button>

    <!-- 채팅창 -->
    <div class="chat-panel" id="chat-panel">

        <!-- ① 로비 목록 화면 -->
        <div class="chat-view chat-view-rooms" id="chat-view-rooms">
            <div class="chat-panel-head">
                <div class="chat-panel-title">실시간 채팅 — 로비 선택</div>
                <button type="button" class="chat-panel-close" onclick="toggleChat()">✕</button>
            </div>
            <div class="chat-room-list" id="chat-room-list">
                <div class="chat-room-loading">로비 목록을 불러오는 중...</div>
            </div>
        </div>

        <!-- ② 채팅 화면 -->
        <div class="chat-view chat-view-room" id="chat-view-room" style="display:none;">
            <div class="chat-panel-head">
                <button type="button" class="chat-room-back" onclick="leaveRoom()">←</button>
                <div class="chat-panel-title">
                    <span class="chat-status-dot" id="chat-status-dot"></span>
                    <span id="chat-room-name">로비</span>
                </div>
                <button type="button" class="chat-panel-close" onclick="toggleChat()">✕</button>
            </div>

            <div class="chat-messages" id="chat-messages">
                <div class="chat-empty" id="chat-empty">아직 대화가 없어요. 첫 메시지를 남겨보세요 💬</div>
            </div>

            <form class="chat-input-row" id="chat-form" onsubmit="return false;">
                <input type="text" id="chat-input" class="chat-input"
                       placeholder="메시지를 입력하세요" maxlength="500" autocomplete="off" />
                <button type="submit" class="chat-send-btn" id="chat-send-btn">전송</button>
            </form>
        </div>
    </div>
</div>

<!-- 비로그인 안내 (플로팅 버튼만, 클릭 시 로그인 유도) -->
<div class="chat-widget" sec:authorize="isAnonymous()">
    <a th:href="@{/login}" class="chat-toggle-btn" title="로그인 후 채팅을 이용할 수 있어요">
        <span class="chat-toggle-icon">💬</span>
    </a>
</div>

<div th:replace="~{layout/footer :: footer}"></div>
<script th:src="@{/js/community.js}"></script>
<script th:src="@{/js/chat.js}"></script>
</body>
</html>
