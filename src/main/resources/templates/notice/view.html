<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>끼역띠귿 — 공지사항 상세</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" th:href="@{/css/layout/navbar.css}" />
  <link rel="stylesheet" th:href="@{/css/layout/footer.css}" />
  <link rel="stylesheet" th:href="@{/css/notice/view.css}" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />

</head>
<body>

<div class="bg-orbs"><div class="orb o1"></div><div class="orb o2"></div></div>

<!-- NAV -->
<div th:replace="~{layout/navbar :: navbar(currentMenu='quiz')}"></div>

<!-- 본문 -->
<div class="view-wrap">

  <!-- 뒤로가기 -->
  <a th:href="@{/notice/list}" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    공지사항 목록
  </a>

  <div class="post-card">

    <!-- 헤더 -->
    <div class="post-header">
      <div class="post-header-top">
        <span class="badge"
              th:classappend="${notice.category == 'notice'} ? 'b-notice' : (${notice.category == 'event'} ? 'b-event' : (${notice.category == 'system'} ? 'b-system' : 'b-update'))"
              th:text="${notice.category == 'notice'} ? '공지' : (${notice.category == 'event'} ? '이벤트' : (${notice.category == 'system'} ? '시스템' : '업데이트'))">공지</span>
      </div>
      <h1 class="post-title" th:text="${notice.title}">제목</h1>
      <div class="post-meta">
        <span>
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 21c0-4.4 3.6-7 8-7s8 2.6 8 7"/>
          </svg>
          <span th:text="${notice.author != null ? notice.author.username : '관리자'}">관리자</span>
        </span>
        <div class="meta-divider"></div>
        <span>
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <span th:text="${#temporals.format(notice.createdAt, 'yyyy.MM.dd')}">2026.01.01</span>
        </span>
      </div>
    </div>

    <!-- 본문 -->
    <div class="post-body" style="white-space: pre-wrap;" th:text="${notice.content}">내용</div>

    <!-- 공유 + 관리자 전용 수정/삭제 -->
    <div class="post-actions">
      <button class="share-btn" onclick="copyLink()">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px; margin-right:4px;">
          <circle cx="18" cy="5" r="3"/>
          <circle cx="6" cy="12" r="3"/>
          <circle cx="18" cy="19" r="3"/>
          <line x1="8.6" y1="10.5" x2="15.4" y2="6.5"/>
          <line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/>
        </svg>
        링크 복사
      </button>

      <span sec:authorize="authentication.name == 'admin888'" class="admin-actions">
        <a th:href="@{/notice/edit/{id}(id=${notice.id})}" class="btn-edit">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5z"/>
          </svg>
          수정
        </a>
        <form th:action="@{/notice/delete/{id}(id=${notice.id})}" method="post" style="display:inline;">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <button type="submit" class="btn-delete" onclick="return confirm('정말 삭제할까요?')">
            <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6"/>
              <path d="M14 11v6"/>
              <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
            </svg>
            삭제
          </button>
        </form>
      </span>
    </div>

    <!-- 이전 / 다음 글: 인접 게시글 조회 기능이 아직 백엔드에 없어 제거했습니다.
         필요하시면 NoticeService에 findPrev/findNext 같은 메서드를 추가해서 연결해드릴 수 있어요. -->

  </div>

  <!-- 목록으로 -->
  <div class="list-btn-wrap">
    <a th:href="@{/notice/list}" class="list-btn">≡ 목록으로</a>
  </div>

</div>

<script>
  function copyLink() {
    navigator.clipboard.writeText(window.location.href).then(() => {
      const btn = event.currentTarget;
      const orig = btn.innerHTML;
      btn.textContent = '복사 완료!';
      setTimeout(() => btn.innerHTML = orig, 1500);
    });
  }
</script>

<!-- FOOTER -->
<div th:replace="~{layout/footer :: footer}"></div>

</body>
</html>
