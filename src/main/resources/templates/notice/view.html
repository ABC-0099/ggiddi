<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>끼역띠귿 — 공지사항 상세</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" th:href="@{/css/layout/navbar.css}" />
  <link rel="stylesheet" th:href="@{/css/layout/footer.css}" />
  <link rel="stylesheet" th:href="@{/css/notice/view.css}" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />

</head>
<body>

<div class="bg-orbs"><div class="orb o1"></div><div class="orb o2"></div></div>

<!-- NAV -->
<div th:replace="~{layout/navbar :: navbar(currentMenu='quiz')}"></div>

<!-- 본문 -->
<div class="view-wrap">

  <!-- 뒤로가기 -->
  <a th:href="@{/notice/list}" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    공지사항 목록
  </a>

  <div class="post-card">

    <!-- 헤더 -->
    <div class="post-header">
      <div class="post-header-top">
        <span class="badge"
              th:classappend="${notice.category == 'notice'} ? 'b-notice' : (${notice.category == 'event'} ? 'b-event' : (${notice.category == 'system'} ? 'b-system' : 'b-update'))"
              th:text="${notice.category == 'notice'} ? '공지' : (${notice.category == 'event'} ? '이벤트' : (${notice.category == 'system'} ? '시스템' : '업데이트'))">공지</span>
      </div>
      <h1 class="post-title" th:text="${notice.title}">제목</h1>
      <div class="post-meta">
        <span>✍️ <span th:text="${notice.author != null ? notice.author.username : '관리자'}">관리자</span></span>
        <div class="meta-divider"></div>
        <span>📅 <span th:text="${#temporals.format(notice.createdAt, 'yyyy.MM.dd')}">2026.01.01</span></span>
      </div>
    </div>

    <!-- 본문 -->
    <div class="post-body" style="white-space: pre-wrap;" th:text="${notice.content}">내용</div>

    <!-- 공유 -->
    <div class="post-actions">
      <button class="share-btn" onclick="copyLink()">🔗 링크 복사</button>
    </div>

    <!-- 이전 / 다음 글: 인접 게시글 조회 기능이 아직 백엔드에 없어 제거했습니다.
         필요하시면 NoticeService에 findPrev/findNext 같은 메서드를 추가해서 연결해드릴 수 있어요. -->

  </div>

  <!-- 목록으로 -->
  <div class="list-btn-wrap">
    <a th:href="@{/notice/list}" class="list-btn">≡ 목록으로</a>
  </div>

</div>

<script>
  function copyLink() {
    navigator.clipboard.writeText(window.location.href).then(() => {
      const btn = event.target;
      const orig = btn.textContent;
      btn.textContent = '✅ 복사 완료!';
      setTimeout(() => btn.textContent = orig, 1500);
    });
  }
</script>

<!-- FOOTER -->
<div th:replace="~{layout/footer :: footer}"></div>

</body>
</html>
