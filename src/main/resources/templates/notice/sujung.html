<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>끼역띠귿 — 공지사항 수정</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" th:href="@{/css/layout/navbar.css}" />
  <link rel="stylesheet" th:href="@{/css/layout/footer.css}" />
  <link rel="stylesheet" th:href="@{/css/notice/form.css}" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
</head>
<body>

<div class="bg-orbs"><div class="orb o1"></div><div class="orb o2"></div></div>

<!-- NAV -->
<div th:replace="~{layout/navbar :: navbar(currentMenu='quiz')}"></div>

<div class="form-wrap">

  <!-- 뒤로가기 -->
  <a th:href="@{/notice/view/{id}(id=${notice.id})}" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    공지사항으로 돌아가기
  </a>

  <form class="form-card" id="noticeForm"
        th:action="@{/notice/update/{id}(id=${notice.id})}"
        th:object="${notice}" method="post">

    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

    <div class="form-header">
      <h1>공지사항 수정</h1>
      <p>등록된 공지사항 내용을 수정합니다.</p>
    </div>

    <div class="form-body">

      <!-- 카테고리 -->
      <div class="form-group">
        <label class="form-label">카테고리<span class="req">*</span></label>
        <div class="category-picker">
          <input type="radio" th:field="*{category}" id="cat-notice" value="notice">
          <label for="cat-notice">공지</label>
          <input type="radio" th:field="*{category}" id="cat-event" value="event">
          <label for="cat-event">이벤트</label>
          <input type="radio" th:field="*{category}" id="cat-system" value="system">
          <label for="cat-system">시스템</label>
          <input type="radio" th:field="*{category}" id="cat-update" value="update">
          <label for="cat-update">업데이트</label>
        </div>
      </div>

      <!-- 제목 -->
      <div class="form-group">
        <label class="form-label" for="title">제목<span class="req">*</span></label>
        <input type="text" id="title" class="form-input" maxlength="100" required
               th:field="*{title}">
      </div>

      <!-- 본문 -->
      <div class="form-group">
        <label class="form-label" for="content">내용<span class="req">*</span></label>
        <textarea id="content" class="form-textarea" maxlength="3000" required
                  oninput="updateCharCount()" th:field="*{content}"></textarea>
        <div class="char-count"><span id="charCount">0</span> / 3000</div>
      </div>

    </div>

    <div class="form-actions">

      <a th:href="@{/notice/view/{id}(id=${notice.id})}" class="btn btn-cancel">취소</a>
      <button type="submit" class="btn btn-primary">저장하기</button>
    </div>

  </form>


</div>

<!-- FOOTER -->
<div th:replace="~{layout/footer :: footer}"></div>



</body>
</html>
