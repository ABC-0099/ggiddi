<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>끼역띠귿 — 공지사항 작성</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" th:href="@{/css/layout/navbar.css}" />
  <link rel="stylesheet" th:href="@{/css/layout/footer.css}" />
  <link rel="stylesheet" th:href="@{/css/notice/view.css}" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <style>
    /* view.css의 post-card 톤을 재사용하는 최소한의 폼 전용 스타일 */
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; margin-bottom: 8px; font-weight: 500; }
    .form-input,
    .form-select,
    .form-textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 14px;
      border: 1px solid rgba(0,0,0,0.15);
      border-radius: 10px;
      font-family: inherit;
      font-size: 15px;
    }
    .form-textarea { min-height: 260px; resize: vertical; white-space: pre-wrap; }
    .form-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }
    .btn-submit, .btn-cancel {
      padding: 10px 22px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-size: 15px;
    }
    .btn-submit { background: #4b6bfb; color: #fff; }
    .btn-cancel { background: #eee; color: #333; text-decoration: none; display: inline-flex; align-items: center; }
  </style>
</head>
<body>

<div class="bg-orbs"><div class="orb o1"></div><div class="orb o2"></div></div>

<!-- NAV -->
<div th:replace="~{layout/navbar :: navbar(currentMenu='quiz')}"></div>

<!-- 본문 -->
<div class="view-wrap">

  <!-- 뒤로가기 -->
  <a th:href="@{/notice/list}" class="back-btn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    공지사항 목록
  </a>

  <div class="post-card">

    <div class="post-header">
      <h1 class="post-title">공지사항 작성</h1>
    </div>

    <form th:action="@{/notice/save}" th:object="${noticeDTO}" method="post">

      <div class="form-group">
        <label class="form-label" for="category">카테고리</label>
        <select class="form-select" id="category" th:field="*{category}">
          <option value="notice">공지</option>
          <option value="event">이벤트</option>
          <option value="system">시스템</option>
          <option value="update">업데이트</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" for="title">제목</label>
        <input class="form-input" type="text" id="title" th:field="*{title}" placeholder="제목을 입력하세요" required />
      </div>

      <div class="form-group">
        <label class="form-label" for="content">내용</label>
        <textarea class="form-textarea" id="content" th:field="*{content}" placeholder="내용을 입력하세요" required></textarea>
      </div>

      <div class="form-actions">
        <a th:href="@{/notice/list}" class="btn-cancel">취소</a>
        <button type="submit" class="btn-submit">등록</button>
      </div>

    </form>

  </div>

</div>

<!-- FOOTER -->
<div th:replace="~{layout/footer :: footer}"></div>

</body>
</html>
